# Compose de PRODUCCION (arquitectura real / frugal: 1 EC2 con todo adentro).
# Las imagenes de api/web se bajan de ghcr.io (publicas, construidas por CI).
# Postgres+Redis corren como contenedores (no RDS/ElastiCache) -> $0 extra.
#
# Uso en la EC2 (lo hace el user-data del FrugalStack):
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Variables en .env (vienen de SSM /chatbot-upc/frugal/env):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   DATABASE_URL, REDIS_URL, OPENAI_API_KEY, META_* , etc.
#   IMAGE_TAG (default latest), DOMAIN (opcional, para HTTPS automatico)

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/chatbot-upc/chatbot-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ghcr.io/chatbot-upc/chatbot-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    command: celery -A chatbot_api.core.celery_app worker --pool=solo --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/chatbot-upc/chatbot-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./infra/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
