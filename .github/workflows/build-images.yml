# Construye y publica las imagenes ARM (linux/arm64) en ghcr.io.
# Usa runners ARM NATIVOS de GitHub (gratis en repos publicos) -> sin QEMU, mas rapido.
# Imagenes resultantes (publicas):
#   ghcr.io/chatbot-upc/chatbot-api
#   ghcr.io/chatbot-upc/chatbot-web
# Las consume docker-compose.prod.yml en la EC2 (FrugalStack).
name: build-images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # runner ARM nativo (repos publicos) -> build arm64 sin emular
    strategy:
      matrix:
        include:
          - name: chatbot-api
            context: apps/api
            file: apps/api/Dockerfile
          - name: chatbot-web
            context: .
            file: apps/web/Dockerfile
            # NEXT_PUBLIC_* se hornean en el build (no en runtime). Valores
            # PÚBLICOS (dominio + config web Firebase) → repo Variables, no Secrets.
            # Setéalas en GitHub: Settings → Secrets and variables → Actions → Variables.
            build_args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
              NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
              NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
              NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
              NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
              NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
              NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/chatbot-upc/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # mode=min: solo exporta las capas finales (no la gigante de torch/CUDA).
          # mode=max tardaba 15min+ exportando GBs a la caché de GHA tras el push.
          cache-to: type=gha,mode=min
