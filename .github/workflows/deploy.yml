# CD — despliegue continuo a la EC2 frugal.
# Se encadena a build-images: cuando ese workflow publica imagenes nuevas en
# ghcr.io, este avisa a la EC2 que ya corre para que se actualice.
#
# Auth: GitHub OIDC -> rol IAM (ChatbotUpc-Cicd, output DeployRoleArn).
#       Sin llaves estaticas; el rol solo lo asume la rama main de este repo.
# Mecanica: SSM Run Command (sin abrir SSH). Si la EC2 esta apagada (rafaga de
#           tear-down), el deploy se OMITE en verde, no falla.
name: deploy

on:
  workflow_run:
    workflows: [build-images]
    types: [completed]

permissions:
  id-token: write   # necesario para OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  SSM_ENV_PARAM: /chatbot-upc/frugal/env

jobs:
  deploy:
    # Solo si build-images termino OK.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolver instancia EC2 (por tag) o omitir si esta apagada
        id: target
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=chatbot-upc" \
              "Name=tag:Mode,Values=frugal" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No hay EC2 frugal corriendo (tear-down activo). Deploy omitido."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Instancia objetivo: $INSTANCE_ID"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Enviar comando de redeploy (SSM Run Command)
        if: steps.target.outputs.skip == 'false'
        id: send
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --comment "CD redeploy ${{ github.event.workflow_run.head_sha }}" \
            --parameters '{"commands":[
              "set -euo pipefail",
              "cd /opt/chatbot",
              "git pull --ff-only",
              "aws ssm get-parameter --name ${{ env.SSM_ENV_PARAM }} --with-decryption --region ${{ env.AWS_REGION }} --query Parameter.Value --output text > .env",
              "docker compose -f docker-compose.prod.yml --env-file .env pull",
              "docker compose -f docker-compose.prod.yml --env-file .env up -d",
              "sleep 15",
              "curl -fsS http://localhost/health",
              "docker image prune -f"
            ]}' \
            --query "Command.CommandId" --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Esperar y verificar resultado
        if: steps.target.outputs.skip == 'false'
        run: |
          CMD="${{ steps.send.outputs.command_id }}"
          INST="${{ steps.target.outputs.instance_id }}"
          # Poll propio (no `wait command-executed`, que se rinde a los ~100s): el
          # `docker compose pull` de la imagen api es pesado, así que damos hasta
          # ~12 min.
          STATUS="Pending"
          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INST" --query Status --output text 2>/dev/null || echo "Pending")
            echo "intento $i: $STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 10 ;;
            esac
          done
          echo "===== STDOUT ====="
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INST" --query StandardOutputContent --output text
          echo "===== STDERR ====="
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INST" --query StandardErrorContent --output text
          echo "Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "::error::El redeploy fallo en la EC2 (status=$STATUS)."
            exit 1
          fi
