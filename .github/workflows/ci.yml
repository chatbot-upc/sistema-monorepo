# CI — SW-55 (HU47): lint + type check + tests antes de cada despliegue.
# Corre en cada PR y en push a main.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: web · lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter web...
      - run: pnpm --filter web lint

  api:
    name: api · ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run mypy
      # pytest usa testcontainers (Postgres+pgvector real); el runner ubuntu trae Docker
      - run: uv run pytest
